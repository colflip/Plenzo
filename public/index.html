<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plenzo 登录系统">
    <meta name="theme-color" content="#10b981">
    <title>登录 - Plenzo</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Styles -->
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
    <link rel="stylesheet" href="/css/core/global.css">

    <style>
        body {
            background-color: var(--color-gray-100);
            background-image:
                radial-gradient(at 0% 0%, var(--color-primary-200) 0px, transparent 50%),
                radial-gradient(at 100% 100%, var(--color-primary-100) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================
         * Mouse-follow Ink Blot Background Layer
         * ============================================ */
        #ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .ink-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0;
            will-change: transform;
            transition: opacity 0.6s ease;
        }

        .ink-blob.loaded {
            opacity: 1;
        }

        .login-card {
            width: 100%;
            max-width: 1420px;
            /* 440px * 1.3 ≈ 570, but keep a little padding margin → 520px to stay usable */
            padding: 1.44rem 2rem;
            /* height reduced ~20% from 2.125rem → 1.6rem; side padding preserved */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border-radius: 18px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            margin-bottom: 0.75rem;
            object-fit: contain;
        }

        .brand-header h1 {
            font-size: 1.625rem;
            /* slightly smaller heading */
            margin-bottom: 0.35rem;
        }

        .brand-header p {
            font-size: 0.875rem;
            color: var(--color-gray-500);
            margin-bottom: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            /* reduced gap between inputs */
        }

        .form-group {
            position: relative;
        }

        .form-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
            pointer-events: none;
            z-index: 10;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.125rem;
        }

        /* ============================================
         * Custom Checkbox — Figma-accurate style
         * ============================================ */
        .remember-me-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.875rem;
            color: #334155;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Hide native checkbox */
        .remember-me-label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Custom checkbox square */
        .remember-me-label .check-box {
            width: 18px;
            height: 18px;
            border: 2px solid #cbd5e1;
            /* slate-300 — empty state */
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: #fff;
        }

        .remember-me-label .check-box svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.15s ease;
        }

        /* Checked state — filled green with checkmark */
        .remember-me-label input[type="checkbox"]:checked+.check-box {
            background: #10b981;
            border-color: #10b981;
        }

        .remember-me-label input[type="checkbox"]:checked+.check-box svg {
            opacity: 1;
            transform: scale(1);
        }

        .remember-me-label:hover .check-box {
            border-color: #10b981;
        }

        .remember-me-label input[type="checkbox"]:checked+.check-box:hover {
            background: #059669;
            border-color: #059669;
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 13px;
            color: var(--color-gray-500);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .login-footer .separator {
            color: var(--color-gray-400);
            font-size: 12px;
            opacity: 0.6;
        }

        .login-footer .brand-text {
            color: var(--color-gray-600);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- Mouse-follow ink blot background -->
    <div id="ink-bg">
        <div class="ink-blob" id="ink-1" style="width:420px;height:420px;background:radial-gradient(circle,rgba(16,185,129,0.18) 0%,rgba(16,185,129,0.06) 50%,transparent 70%);"></div>
        <div class="ink-blob" id="ink-2" style="width:350px;height:350px;background:radial-gradient(circle,rgba(52,211,153,0.14) 0%,rgba(52,211,153,0.04) 50%,transparent 70%);"></div>
        <div class="ink-blob" id="ink-3" style="width:380px;height:380px;background:radial-gradient(circle,rgba(110,231,183,0.12) 0%,rgba(110,231,183,0.03) 50%,transparent 70%);"></div>
    </div>

    <div id="app" class="animate-fade-in">
        <div class="card login-card">
            <div class="brand-header">
                <img src="/assets/logo.svg" alt="Logo" class="brand-icon">
                <h1>欢迎回来</h1>
                <p>请登录您的账户以继续</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <span class="material-icons-round form-icon">person</span>
                    <input type="text" id="username" class="form-input" placeholder="用户名" aria-label="用户名">
                </div>

                <div class="form-group">
                    <span class="material-icons-round form-icon">lock</span>
                    <input type="password" id="password" class="form-input" placeholder="密码" aria-label="密码">
                </div>

                <div class="form-group">
                    <span class="material-icons-round form-icon">badge</span>
                    <!-- Hidden native select for form data -->
                    <select id="userType" class="form-input" aria-label="用户类型" style="display: none;">
                        <option value="teacher" selected>教师</option>
                        <option value="student">学生</option>
                        <option value="admin">管理员</option>
                    </select>

                    <!-- Custom Dropdown Trigger -->
                    <div class="custom-select-wrapper">
                        <div class="custom-select-trigger form-input">
                            <span id="customSelectText">教师</span>
                            <span class="material-icons-round arrow">expand_more</span>
                        </div>
                        <div class="custom-options">
                            <div class="custom-option selected" data-value="teacher">教师</div>
                            <div class="custom-option" data-value="student">学生</div>
                            <div class="custom-option" data-value="admin">管理员</div>
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="check-box">
                            <svg viewBox="0 0 24 24">
                                <polyline points="4 12 10 18 20 6"></polyline>
                            </svg>
                        </span>
                        保持登录
                    </label>
                </div>
            </div>

            <button id="loginBtn" class="btn primary-btn"
                style="width: 100%; justify-content: center; padding: 12px; margin-top: 1.25rem; border-radius: 10px; font-size: 0.95rem; font-weight: 600;">
                登录
            </button>

            <div id="errorMessage" class="error-message text-center" style="color: var(--color-error); display: none;">
            </div>
        </div>

        <div class="login-footer">
            <span class="brand-text">Plenzo</span>
            <span class="separator">|</span>
            <span class="copyright-text">&copy; <span id="copyrightYear">2007</span> 蔚蓝</span>
        </div>
    </div>
    <script src="/js/core/api-client.js"></script>
    <script src="/js/core/main.js"></script>
    <script>
        // Update copyright year
        const currentYear = new Date().getFullYear();
        const startYear = 2007;
        const yearText = currentYear > startYear ? `${startYear}-${currentYear}` : startYear;
        document.getElementById('copyrightYear').textContent = yearText;

        /* ============================================
         * Mouse-follow Ink Blot Background
         * Preserves original CSS radial gradients,
         * adds green ink blobs that follow the cursor
         * with smooth, organic movement.
         * ============================================ */
        (function() {
            'use strict';

            var inkBg = document.getElementById('ink-bg');
            if (!inkBg) return;

            var blobs = inkBg.querySelectorAll('.ink-blob');
            if (!blobs.length) return;

            var W, H, cx, cy;
            var mouseX = 0, mouseY = 0;
            var targetMX = 0, targetMY = 0;
            var rafId = null;
            var time = 0;
            var visible = true;
            var loaded = false;

            // Each blob has its own parallax depth, organic wobble, and base offset
            var defs = [
                { x: 0.50, y: 0.50,  depth: 1.0,  wobbleAmp: 35, wobbleSpeed: 0.0012, driftX: 0.0008, driftY: 0.0006 },
                { x: 0.60, y: 0.40,  depth: 0.7,  wobbleAmp: 25, wobbleSpeed: 0.0015, driftX: 0.0010, driftY: 0.0009 },
                { x: 0.40, y: 0.55,  depth: 0.5,  wobbleAmp: 20, wobbleSpeed: 0.0010, driftX: 0.0006, driftY: 0.0011 }
            ];

            var positions = [];
            var sizes = [];

            function init() {
                W = window.innerWidth;
                H = window.innerHeight;
                cx = W / 2;
                cy = H / 2;

                for (var i = 0; i < blobs.length; i++) {
                    var bw = blobs[i].offsetWidth;
                    var bh = blobs[i].offsetHeight;
                    sizes.push({ w: bw, h: bh });

                    // Each blob starts at a different offset from center
                    positions.push({
                        curX: defs[i].x * W,
                        curY: defs[i].y * H,
                        targetX: defs[i].x * W,
                        targetY: defs[i].y * H
                    });
                }

                // Fade in after first frame
                requestAnimationFrame(function() {
                    for (var i = 0; i < blobs.length; i++) {
                        blobs[i].classList.add('loaded');
                    }
                    loaded = true;
                });

                tick();
            }

            function lerp(a, b, n) { return a + (b - a) * n; }

            function onMove(e) {
                targetMX = (e.clientX / W - 0.5) * 2;  // -1 ~ 1
                targetMY = (e.clientY / H - 0.5) * 2;
            }

            function onVisibility() {
                visible = !document.hidden;
                if (visible && !rafId) tick();
            }

            function tick() {
                if (!visible) { rafId = null; return; }

                time++;

                // Smooth mouse tracking
                mouseX = lerp(mouseX, targetMX, 0.025);
                mouseY = lerp(mouseY, targetMY, 0.025);

                for (var i = 0; i < blobs.length; i++) {
                    var d = defs[i];
                    var p = positions[i];

                    // Mouse parallax: deeper blobs move more
                    var mxOff = mouseX * d.depth * 80;
                    var myOff = mouseY * d.depth * 80;

                    // Organic wobble: sine + cosine at different rates
                    var wobbleX = Math.sin(time * d.wobbleSpeed) * d.wobbleAmp;
                    var wobbleY = Math.cos(time * d.wobbleSpeed * 0.7) * d.wobbleAmp;

                    // Slow drift around base position
                    var driftX = Math.sin(time * d.driftX) * 30;
                    var driftY = Math.cos(time * d.driftY) * 25;

                    // Combine: base position + mouse + wobble + drift
                    p.curX = lerp(p.curX, d.x * W + mxOff + wobbleX + driftX, 0.03);
                    p.curY = lerp(p.curY, d.y * H + myOff + wobbleY + driftY, 0.03);

                    // Apply transform
                    var halfW = sizes[i].w / 2;
                    var halfH = sizes[i].h / 2;
                    blobs[i].style.transform =
                        'translate3d(' + (p.curX - halfW) + 'px,' + (p.curY - halfH) + 'px,0)';
                }

                rafId = requestAnimationFrame(tick);
            }

            window.addEventListener('resize', function() {
                W = window.innerWidth;
                H = window.innerHeight;
                cx = W / 2;
                cy = H / 2;
            });
            window.addEventListener('mousemove', onMove);
            document.addEventListener('visibilitychange', onVisibility);

            // Wait for layout to settle
            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        })();
    </script>
</body>

</html>
